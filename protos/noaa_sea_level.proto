syntax = "proto3";

package scraper;

message SeaLevelRecord {
  string station_id        = 1;
  string station_name      = 2;
  int32  year              = 3;
  int32  month             = 4;
  float  mean_sea_level_mm = 5;
  string source_url        = 6;
  string fetch_time        = 7;  // ISO-8601 UTC
}
