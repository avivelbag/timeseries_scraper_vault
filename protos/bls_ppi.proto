syntax = "proto3";

package scraper;

import "google/protobuf/timestamp.proto";

message BLSPpiRecord {
  string series_id = 1;
  string commodity_description = 2;
  string period = 3;
  float index_value = 4;
  bool preliminary = 5;
  float percent_change_1m = 6;
  float percent_change_12m = 7;
  string source_url = 8;
  google.protobuf.Timestamp fetch_time = 9;
}
